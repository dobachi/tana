<!doctype html>
<html lang="ja" data-theme="cyber-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tana</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-mode="safe">
    <div id="app">
      <!-- メニューバー: 既定は表示。Ctrl+Shift+B で開閉 -->
      <div id="menu-bar" role="menubar"></div>

      <!-- Sidebar: 場所(Places) + お気に入り(Favorites) -->
      <aside id="sidebar" tabindex="-1">
        <section class="sidebar-section">
          <h2 class="sidebar-title">場所</h2>
          <ul id="places" class="sidebar-list">
            <li class="placeholder">（M2 で実装）</li>
          </ul>
        </section>
        <section class="sidebar-section" id="favorites-section">
          <h2 class="sidebar-title">
            お気に入り
            <button id="fav-add-folder" class="sidebar-btn" title="フォルダを追加">＋</button>
          </h2>
          <input id="fav-search" class="fav-search" type="search" placeholder="検索…" />
          <ul id="favorites" class="sidebar-list"></ul>
        </section>
      </aside>

      <!-- Workspace: 2ペイン -->
      <main id="workspace">
        <section class="pane" id="pane-left" data-pane="left" tabindex="0">
          <header class="pane-header">
            <span class="pane-path">—</span>
            <input
              class="pane-path-input"
              type="text"
              spellcheck="false"
              autocomplete="off"
              aria-label="パスを入力"
            />
          </header>
          <ul class="pane-list"></ul>
        </section>
        <div class="pane-divider"></div>
        <section class="pane" id="pane-right" data-pane="right" tabindex="0">
          <header class="pane-header">
            <span class="pane-path">—</span>
            <input
              class="pane-path-input"
              type="text"
              spellcheck="false"
              autocomplete="off"
              aria-label="パスを入力"
            />
          </header>
          <ul class="pane-list"></ul>
        </section>
      </main>

      <!-- プレビュー (FR-09)。既定は非表示。Ctrl+P で開閉、Ctrl+Shift+P で配置切替 -->
      <div class="preview-divider" id="preview-divider"></div>
      <section id="preview" class="preview" aria-label="プレビュー">
        <button
          id="preview-close"
          class="preview-close"
          type="button"
          title="プレビューを閉じる (Ctrl+P)"
          aria-label="プレビューを閉じる"
        >
          ✕
        </button>
        <div class="preview-content" id="preview-content"></div>
        <aside class="preview-info" id="preview-info" aria-label="ファイル情報"></aside>
      </section>

      <!-- Status Bar -->
      <footer id="statusbar">
        <span id="mode-indicator" class="mode-indicator">● 安全モード</span>
        <span id="status-path" class="status-path"></span>
        <span id="status-selection" class="status-selection"></span>
        <span id="status-hidden" class="status-hidden"></span>
        <span id="status-hint" class="status-hint">? でヘルプ</span>
        <span class="font-scale-group" role="group" aria-label="文字サイズ">
          <button id="font-smaller" class="status-btn" type="button" title="文字を小さく (Ctrl+-)">
            A-
          </button>
          <button
            id="font-reset"
            class="status-btn font-scale-value"
            type="button"
            title="文字サイズ"
          >
            100%
          </button>
          <button id="font-larger" class="status-btn" type="button" title="文字を大きく (Ctrl++)">
            A+
          </button>
        </span>
        <button id="check-updates" class="status-btn" type="button" title="更新を確認">
          更新を確認
        </button>
      </footer>
    </div>
    <script type="module" src="bundle.js"></script>
  </body>
</html>
