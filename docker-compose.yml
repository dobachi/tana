# Tana 動作確認用 compose
#   GUI:    docker compose up --build         → http://localhost:6080/vnc.html
#   テスト: docker compose run --rm tana test
#   CI相当: docker compose run --rm tana check
#   シェル: docker compose run --rm tana shell
#
# 安全性: ホストのファイルシステムはマウントしない（完全分離）。
services:
  tana:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: tana-verify
    ports:
      - '6080:6080'
    # ホスト非マウント。操作はコンテナ内サンドボックスで完結。
